<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Beta Pro</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --neon: #38bdf8;
            --accent: #f43f5e;
            --text: #f8fafc;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Prevents scrolling/zooming while playing */
        }

        .game-container {
            width: 90vw;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .score-box {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--neon);
            letter-spacing: 1px;
        }

        canvas {
            background: #000;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            border: 2px solid #334155;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* D-PAD for Mobile */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            width: 210px;
            margin: 20px auto 0;
        }

        .btn {
            width: 60px;
            height: 60px;
            background: var(--card);
            border: 1px solid var(--neon);
            color: var(--neon);
            border-radius: 15px;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: var(--neon);
            color: var(--bg);
            transform: scale(0.95);
        }

        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .status-msg {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div style="font-weight: bold; letter-spacing: 2px;">SNAKE<span style="color:var(--neon)">_BETA</span></div>
            <div class="score-box" id="score">00</div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <div class="btn up" id="btn-up">▲</div>
            <div class="btn left" id="btn-left">◀</div>
            <div class="btn down" id="btn-down">▼</div>
            <div class="btn right" id="btn-right">▶</div>
        </div>
        
        <div class="status-msg" id="msg">TAP ANY ARROW TO START</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const msgEl = document.getElementById("msg");

        const box = 20;
        let score = 0;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = { x: 5 * box, y: 5 * box };
        let d = null;
        let active = false;

        // Direction logic
        function setDirection(newD) {
            if (!active) {
                active = true;
                msgEl.innerText = "SYSTEM_RUNNING";
            }
            if (newD === "LEFT" && d !== "RIGHT") d = "LEFT";
            if (newD === "UP" && d !== "DOWN") d = "UP";
            if (newD === "RIGHT" && d !== "LEFT") d = "RIGHT";
            if (newD === "DOWN" && d !== "UP") d = "DOWN";
        }

        // Event Listeners
        document.addEventListener("keydown", e => {
            if(e.keyCode == 37) setDirection("LEFT");
            if(e.keyCode == 38) setDirection("UP");
            if(e.keyCode == 39) setDirection("RIGHT");
            if(e.keyCode == 40) setDirection("DOWN");
        });

        document.getElementById("btn-up").addEventListener("touchstart", (e) => { e.preventDefault(); setDirection("UP"); });
        document.getElementById("btn-down").addEventListener("touchstart", (e) => { e.preventDefault(); setDirection("DOWN"); });
        document.getElementById("btn-left").addEventListener("touchstart", (e) => { e.preventDefault(); setDirection("LEFT"); });
        document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); setDirection("RIGHT"); });
        
        // Mouse support for desktop testing
        document.getElementById("btn-up").onclick = () => setDirection("UP");
        document.getElementById("btn-down").onclick = () => setDirection("DOWN");
        document.getElementById("btn-left").onclick = () => setDirection("LEFT");
        document.getElementById("btn-right").onclick = () => setDirection("RIGHT");

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#38bdf8" : "#0ea5e9";
                ctx.fillRect(part.x, part.y, box - 2, box - 2);
            });

            // Draw Food
            ctx.fillStyle = "#f43f5e";
            ctx.fillRect(food.x, food.y, box - 2, box - 2);

            if (!active) return;

            let headX = snake[0].x;
            let headY = snake[0].y;

            if (d === "LEFT") headX -= box;
            if (d === "UP") headY -= box;
            if (d === "RIGHT") headX += box;
            if (d === "DOWN") headY += box;

            // Collision
            if (headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || 
                snake.some((p, i) => i !== 0 && p.x === headX && p.y === headY)) {
                alert("GAME OVER! SCORE: " + score);
                location.reload();
                return;
            }

            if (headX === food.x && headY === food.y) {
                score++;
                scoreEl.innerText = score.toString().padStart(2, '0');
                food = {
                    x: Math.floor(Math.random() * 20) * box,
                    y: Math.floor(Math.random() * 20) * box
                };
            } else {
                snake.pop();
            }

            snake.unshift({ x: headX, y: headY });
        }

        setInterval(draw, 120);
    </script>
</body>
</html>
