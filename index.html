<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Evolution // Beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-card">
        <div class="header">
            <div class="logo">SNAKE<span>.IO</span></div>
            <div class="score-wrapper">
                <span class="label">SCORE</span>
                <span id="scoreVal">00</span>
            </div>
        </div>

        <div class="viewport">
            <canvas id="gameCanvas"></canvas>
            <div id="touchMsg" class="overlay">TAP TO INITIALIZE</div>
        </div>

        <div class="dpad">
            <button class="btn up" id="u">▲</button>
            <button class="btn left" id="l">◀</button>
            <button class="btn down" id="d">▼</button>
            <button class="btn right" id="r">▶</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
